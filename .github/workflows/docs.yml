name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - 'Anatomy/**'
      - 'Physiology/**'
      - 'Pathology/**'
      - 'Pharmacology/**'
      - 'Medicine/**'
      - 'Surgery/**'
      - 'ObsGyn/**'
      - 'Pediatrics/**'
      - 'README.md'
      - 'Cardiac_Cycle_Study_Material.md'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Sync content to docs folder
        run: |
          chmod +x sync-docs.sh
          ./sync-docs.sh

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy documentation
        run: |
          mkdocs gh-deploy --force --clean --verbose
